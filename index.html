<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css" />

</head>
<body>
    <nav class="navbar" id="navbar">
        <img src="logo.png" alt="Logo" class="logo">
        <img src="image.png" alt="Menu" class="menu-icon" id="menu-toggle">
        <ul class="nav-links">
            <li><a href="#" class="nav-home">Home</a></li>
            <li><a href="#" class="nav-item">Loans</a></li>
            <li><a href="#" class="nav-item">Business Management</a></li>
            <li><a href="#" class="nav-item">Contact Us</a></li>
        </ul>
        <a href="#" class="login">Login</a>
        <a href="#" class="signup-btn">Sign Up</a>
    </nav>

    <section class="hero">
        <h1 class="hero-title">Built for growth.<br>Built for your small business.</h1>
        <p class="hero-description">Lending and payment options that make it easy to run your business<br>with confidence.</p>
        <button class="hero-btn">
            <span class="hero-btn-text">Get Started</span>
            <div class="hero-btn-circle">
                <img src="handle.png" alt="Handle" class="handle-icon">
            </div>
        </button>
        <a href="#" class="learn-more">Learn more</a>
        <img src="son.png" alt="Son" class="son-image">
    </section>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const navbar = document.getElementById('navbar');
        menuToggle.addEventListener('click', () => {
            navbar.classList.toggle('active');
        });
    </script>
</body>
</html>
